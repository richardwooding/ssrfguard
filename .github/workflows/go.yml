name: Go

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2

    - name: Set up Go
      uses: actions/setup-go@v6.4.0
      with:
        go-version: '1.26'

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -race -v ./...

    - name: Run fuzz tests (short)
      run: go test -run=^$ -fuzz=FuzzValidateURL -fuzztime=20x .

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9.2.0
      with:
        version: v2.12.2
