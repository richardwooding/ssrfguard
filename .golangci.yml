# golangci-lint v2 configuration
# https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  go: '1.26'

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new-from-rev: ""

linters:
  default: none
  enable:
    - gosec
    - prealloc
    - gocyclo
    - gocognit
    - revive
    - staticcheck
    - gocritic
    - govet
    - ineffassign
    - errcheck
    - errorlint
    - dupl
    - goconst
    - unconvert
    - unused
    - nolintlint
    - misspell

  settings:
    gocyclo:
      min-complexity: 15

    gocognit:
      min-complexity: 20

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint

    govet:
      disable:
        - fieldalignment

    revive:
      rules:
        - name: exported
          arguments: [checkPrivateReceivers, sayRepetitiveInsteadOfStutters]

    staticcheck:
      checks: ["all"]

    misspell:
      locale: US

    dupl:
      threshold: 100

    goconst:
      min-len: 2
      min-occurrences: 3

    prealloc:
      simple: true
      range-loops: true
      for-loops: true

  exclusions:
    rules:
      # Tests legitimately repeat literal fixtures and skip some checks.
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - gocritic
          - goconst
      - linters:
          - govet
        text: "shadow: declaration of \"err\" shadows declaration"

formatters:
  enable:
    - gofmt
    - goimports
    - gofumpt

  settings:
    goimports:
      local-prefixes: ["github.com/richardwooding/ssrfguard"]

    gofumpt: {}
